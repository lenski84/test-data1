name: Update Macro Scores

on:
  schedule:
    - cron: '0 6 * * *'   # täglich 06:00 UTC
  workflow_dispatch:        # auch manuell auslösbar

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests
      
      - run: python scripts/fetch_scores.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          git diff --staged --quiet || git commit -m "Update macro scores $(date -u +%Y-%m-%d)"
          git push
